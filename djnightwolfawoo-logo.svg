<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">DJNIGHTWOLFAWOO logo</title>
  <desc id="desc">A night-themed DJ wolf logo with headphones, turntable rings, moon, stars, and bold wordmark.</desc>
  <defs>
    <linearGradient id="night" x1="120" y1="78" x2="1080" y2="1122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15152d"/>
      <stop offset=".48" stop-color="#26235b"/>
      <stop offset="1" stop-color="#071017"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="333" y1="355" x2="867" y2="813" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78f2ff"/>
      <stop offset=".52" stop-color="#22b9ff"/>
      <stop offset="1" stop-color="#9a6cff"/>
    </linearGradient>
    <linearGradient id="moonGold" x1="736" y1="168" x2="972" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff5b6"/>
      <stop offset=".62" stop-color="#f7c756"/>
      <stop offset="1" stop-color="#f27b44"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.76 0 0 0 0 1 0 0 0 .72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wordGlow" x="-12%" y="-30%" width="124%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#2fc7ff" flood-opacity=".72"/>
    </filter>
    <clipPath id="badgeClip">
      <circle cx="600" cy="560" r="468"/>
    </clipPath>
  </defs>

  <rect width="1200" height="1200" fill="#05070c"/>
  <circle cx="600" cy="560" r="504" fill="url(#night)"/>
  <circle cx="600" cy="560" r="502" fill="none" stroke="#1cf4ff" stroke-width="8"/>
  <circle cx="600" cy="560" r="468" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="18"/>

